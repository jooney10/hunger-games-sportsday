<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reassured Sports Day — The Games</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="embers" id="embers"></div>

  <div class="page">
    <header class="top-bar">
      <div class="brand"><span class="mockingjay">🕊️</span> SPORTS DAY: THE GAMES</div>
      <a class="btn btn-ghost" href="/leaderboard" style="font-size:0.85rem;padding:0.5rem 1rem;">Leaderboard →</a>
    </header>

    <main>
      <!-- Onboarding -->
      <section id="onboarding" class="center-screen" hidden>
        <div class="card" style="max-width:640px;width:100%;">
          <h1 class="hero-title" style="font-size:2.5rem;">JOIN THE ARENA</h1>
          <p class="hero-sub" style="margin-bottom:var(--space-md);">Enter your name, tribute, and pick who you think will win it all.</p>

          <form id="onboarding-form">
            <div class="field">
              <label for="player-name">Your Name</label>
              <input type="text" id="player-name" maxlength="40" placeholder="e.g. Katniss E." required />
            </div>

            <div class="field">
              <label>Who will win Sports Day overall?</label>
              <div class="district-grid" id="prediction-grid"></div>
            </div>

            <p class="error-text" id="onboarding-error" hidden></p>

            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:var(--space-sm);">
              Enter The Games
            </button>
          </form>
        </div>
      </section>

      <!-- Arena -->
      <section id="arena" hidden>
        <div class="card" id="status-card">
          <div class="status-banner">
            <div class="status-icon">🔥</div>
            <h2 id="status-title" class="font-display" style="font-size:1.8rem;">Waiting for the Capitol...</h2>
            <p id="status-sub" class="hero-sub" style="font-size:1rem;"></p>
          </div>
        </div>

        <hr class="gold-rule" />

        <div class="card">
          <h3 class="mono-tag" style="margin-bottom:0.75rem;">Your Tribute Card</h3>
          <div style="display:flex; flex-wrap:wrap; gap:2rem; align-items:center;">
            <div>
              <div class="mono-tag">Player</div>
              <div id="my-name" style="font-size:1.2rem;font-weight:700;"></div>
            </div>
            <div>
              <div class="mono-tag">Overall Prediction</div>
              <div id="my-prediction" style="font-size:1.2rem;font-weight:700;"></div>
            </div>
            <div>
              <div class="mono-tag">Current Score</div>
              <div id="my-score" style="font-size:1.6rem;font-weight:700;color:var(--color-gold-bright);">0</div>
            </div>
          </div>
        </div>

        <hr class="gold-rule" />

        <div class="card">
          <h3 class="mono-tag" style="margin-bottom:0.75rem;">The Games</h3>
          <div class="games-list" id="games-list"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast-root"></div>

  <!-- Voting modal -->
  <div class="modal-overlay" id="vote-modal" hidden>
    <div class="card modal">
      <span class="badge badge-live">● LIVE NOW</span>
      <h2 class="font-display" style="font-size:2rem;margin-top:0.5rem;" id="vote-game-name"></h2>
      <p class="hero-sub" style="font-size:1rem;">Cast your vote for this round's winning District.</p>
      <div class="district-grid" id="vote-grid" style="margin-top:var(--space-md);"></div>
      <p class="error-text" id="vote-error" hidden></p>
    </div>
  </div>

  <script src="/js/embers.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/player.js"></script>
</body>
</html>
