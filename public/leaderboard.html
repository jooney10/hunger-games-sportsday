<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — Reassured Sports Day</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="leaderboard-page">
  <div class="embers" id="embers"></div>

  <div class="page">
    <header class="top-bar">
      <div class="brand"><span class="mockingjay">🕊️</span> SPORTS DAY: THE GAMES</div>
      <span class="mono-tag" id="last-updated"></span>
    </header>

    <main>
      <div class="leaderboard-hero">
        <div class="mono-tag">Panem Standings</div>
        <h1 class="hero-title gradient-text">THE LEADERBOARD</h1>
        <p class="hero-sub">May the odds be ever in your favour.</p>
      </div>

      <div class="live-strip" id="live-strip"></div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Tribute</th>
                <th>Overall Prediction</th>
                <th>Points</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body">
              <tr><td colspan="4" style="text-align:center;color:var(--color-text-dim);">Waiting for tributes to join…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/embers.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/leaderboard.js"></script>
</body>
</html>
